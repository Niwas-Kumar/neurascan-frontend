<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#312E81"/>
      <stop offset="100%" stopColor="#6366F1"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#14B8A6"/>
      <stop offset="100%" stopColor="#2DD4BF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="#312E81" opacity="0.1"/>

  <!-- Outer circle - scan ring -->
  <circle cx="24" cy="24" r="22" stroke="#312E81" strokeWidth="1.5" strokeOpacity="0.2" fill="none"/>

  <!-- Brain outline - left hemisphere -->
  <path
    d="M24 8C18 8 13 12 12 18C11 22 12 26 14 29C15 31 15 33 15 35C15 37 16 39 18 39C19 39 20 38 20 37L20 35C20 33 21 31 23 30"
    stroke="url(#brainGradient)"
    strokeWidth="2.5"
    strokeLinecap="round"
    strokeLinejoin="round"
    fill="none"
  />

  <!-- Brain outline - right hemisphere -->
  <path
    d="M24 8C30 8 35 12 36 18C37 22 36 26 34 29C33 31 33 33 33 35C33 37 32 39 30 39C29 39 28 38 28 37L28 35C28 33 27 31 25 30"
    stroke="url(#brainGradient)"
    strokeWidth="2.5"
    strokeLinecap="round"
    strokeLinejoin="round"
    fill="none"
  />

  <!-- Brain stem -->
  <path
    d="M24 30V40"
    stroke="url(#brainGradient)"
    strokeWidth="2"
    strokeLinecap="round"
  />

  <!-- Neural connection lines -->
  <path
    d="M17 17L22 20M22 20L17 24M22 20L24 16"
    stroke="#14B8A6"
    strokeWidth="1.5"
    strokeLinecap="round"
    strokeOpacity="0.7"
  />
  <path
    d="M31 17L26 20M26 20L31 24M26 20L24 16"
    stroke="#14B8A6"
    strokeWidth="1.5"
    strokeLinecap="round"
    strokeOpacity="0.7"
  />

  <!-- Neural nodes - digital scan points -->
  <circle cx="17" cy="17" r="2.5" fill="url(#nodeGradient)" filter="url(#glow)"/>
  <circle cx="31" cy="17" r="2.5" fill="url(#nodeGradient)" filter="url(#glow)"/>
  <circle cx="22" cy="20" r="2" fill="#14B8A6"/>
  <circle cx="26" cy="20" r="2" fill="#14B8A6"/>
  <circle cx="24" cy="16" r="2.5" fill="url(#nodeGradient)" filter="url(#glow)"/>
  <circle cx="17" cy="24" r="2" fill="#14B8A6"/>
  <circle cx="31" cy="24" r="2" fill="#14B8A6"/>
</svg>
