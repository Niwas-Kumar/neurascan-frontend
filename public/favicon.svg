<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#312E81"/>
      <stop offset="100%" stopColor="#6366F1"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#14B8A6"/>
      <stop offset="100%" stopColor="#2DD4BF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="#312E81" opacity="0.1"/>

  <!-- Outer circle - scan ring -->
  <circle cx="24" cy="24" r="22" stroke="#312E81" strokeWidth="1.5" strokeOpacity="0.2" fill="none"/>

  <!-- Brain outline - left hemisphere -->
  <path
    d="M24 9 C20 9 15 9.5 12 14 C9 19 10 24 13 28 C15.5 31.5 19 34 22 35 Q23 35.5 24 35"
    stroke="url(#brainGradient)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Brain outline - right hemisphere -->
  <path
    d="M24 9 C28 9 33 9.5 36 14 C39 19 38 24 35 28 C32.5 31.5 29 34 26 35 Q25 35.5 24 35"
    stroke="url(#brainGradient)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Central fissure -->
  <line x1="24" y1="9" x2="24" y2="35" stroke="url(#brainGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Brain stem -->
  <path
    d="M22 35 Q23 38 24 41 M26 35 Q25 38 24 41"
    stroke="url(#brainGradient)"
    stroke-width="2"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Left brain folds (sulci) -->
  <path d="M14 16 Q18 18.5 22 16" stroke="url(#brainGradient)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M12 22 Q17 25 23 22" stroke="url(#brainGradient)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M15 28 Q19 30.5 23 28" stroke="url(#brainGradient)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Right brain folds (sulci) -->
  <path d="M34 16 Q30 18.5 26 16" stroke="url(#brainGradient)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M36 22 Q31 25 25 22" stroke="url(#brainGradient)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M33 28 Q29 30.5 25 28" stroke="url(#brainGradient)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Neural network connections -->
  <path d="M16 16L20 20M20 20L24 12M20 20L13 23" stroke="#14B8A6" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M32 16L28 20M28 20L24 12M28 20L35 23" stroke="#14B8A6" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Neural nodes - digital scan points -->
  <circle cx="24" cy="12" r="2.5" fill="url(#nodeGradient)" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="2" fill="url(#nodeGradient)" filter="url(#glow)"/>
  <circle cx="32" cy="16" r="2" fill="url(#nodeGradient)" filter="url(#glow)"/>
  <circle cx="20" cy="20" r="2" fill="#14B8A6"/>
  <circle cx="28" cy="20" r="2" fill="#14B8A6"/>
  <circle cx="13" cy="23" r="1.8" fill="#14B8A6"/>
  <circle cx="35" cy="23" r="1.8" fill="#14B8A6"/>
</svg>
